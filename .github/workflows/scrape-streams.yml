name: تحديث روابط المشاهدة تلقائيًا

on:
  schedule:
    # كل 90 دقيقة: 00:00, 01:30, 03:00, 04:30, 06:00, ...
    - cron: '0 */3 * * *'
    - cron: '30 1-23/3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-streams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تثبيت الاعتماديات
        run: npm install cheerio

      - name: تشغيل سكريبت السحب
        run: |
          node scripts/scrape-streams.js
          node scripts/kooragoal.js

      - name: رفع التحديثات
        run: |
          git config user.name "Stream Bot"
          git config user.email "bot@example.com"
          git add streams.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي لروابط المشاهدة - $(date '+%Y-%m-%d %H:%M')"
          git push
