name: تحديث مباريات كأس العالم تلقائيًا

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تشغيل سكريبت التحديث
        run: node scripts/update-matches.js

      - name: رفع التحديثات إلى المستودع
        run: |
          git config user.name "World Cup Bot"
          git config user.email "bot@example.com"
          git add matches.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي لنتائج المباريات - $(date '+%Y-%m-%d %H:%M')"
          git push
